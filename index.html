<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EUPH</title>
  <meta name="description" content="よろしくお願いします">
  <!-- content:social-preview -->
  <meta name="theme-color" content="#ECE7DA">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- only the weights the stylesheet uses: Archivo 400/600, Shippori 400/500,
       Zen Kaku 400 (body JP) / 500 (mono-label JP) / 700 (ticker JP) -->
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:wght@400;600&family=Shippori+Mincho:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
  <script>
    // Pre-paint: ?intro=0 skips the curtain intro (prototype's `playIntro`
    // prop); arriving via an internal link also skips it and starts covered
    // by the sweep overlay so src/nav.js can reveal the page.
    (function () {
      var html = document.documentElement;
      if (/[?&]intro=0(?:&|$)/.test(location.search)) html.classList.add('no-intro');
      try {
        var nav = sessionStorage.getItem('euph-nav');
        if (nav) sessionStorage.removeItem('euph-nav');
        if (nav && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
          html.classList.add(nav === 'back' ? 'arriving-back' : 'arriving', 'no-intro');
        }
      } catch (e) { /* sessionStorage unavailable — plain load */ }
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</head>
<body>

<!-- Ink curtains, bottom edge leading: fixed viewport overlay so the intro
     covers the whole screen at any scroll position (first in body so they
     paint before the content they hide; removed by main.js when done) -->
<div class="curtain curtain--left" aria-hidden="true"></div>
<div class="curtain curtain--right" aria-hidden="true"></div>

<!-- stage-sweep page-transition overlay (driven by src/nav.js) -->
<div class="sweep" aria-hidden="true"></div>

<!-- Shared SVG symbols: four-pointed star motif + contact icons -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <symbol id="star" viewBox="0 0 100 100">
    <path d="M50 0C54.5 33.5 66.5 45.5 100 50C66.5 54.5 54.5 66.5 50 100C45.5 66.5 33.5 54.5 0 50C33.5 45.5 45.5 33.5 50 0Z"/>
  </symbol>
  <symbol id="ic-x" viewBox="0 0 100 100">
    <path d="M28 28 L72 72 M72 28 L28 72" fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round"/>
  </symbol>
  <symbol id="ic-mail" viewBox="0 0 100 100">
    <g fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="round">
      <rect x="16" y="26" width="68" height="48" rx="7"/>
      <path d="M20 32 L50 56 L80 32"/>
    </g>
  </symbol>
  <symbol id="ic-branch" viewBox="0 0 100 100">
    <g fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round">
      <circle cx="30" cy="25" r="9"/>
      <circle cx="30" cy="75" r="9"/>
      <circle cx="71" cy="37" r="9"/>
      <path d="M30 34 L30 66 M71 46 C71 62 30 52 30 64"/>
    </g>
  </symbol>
</svg>

<!-- ==================== HERO ==================== -->
<header class="hero" id="top">
  <div class="hero__stage">

    <div class="hero__rules rise rise--rules">
      <span class="hero__rule"></span>
      <span class="label-mono">PRODUCER TRACK</span>
      <span class="hero__rule"></span>
    </div>

    <div class="hero__title">
      <h1 aria-label="Euph"><span aria-hidden="true" class="h1-l">E</span><span aria-hidden="true" class="h1-l">u</span><span aria-hidden="true" class="h1-l">p</span><span aria-hidden="true" class="h1-l">h</span></h1>
      <span class="hero__subtitle" lang="ja" aria-label="ユーフ"><span aria-hidden="true"><span class="sub-ch">ユ</span><span class="sub-ch">ー</span><span class="sub-ch">フ</span></span></span>
    </div>

    <nav class="contacts rise rise--contacts" aria-label="Contact">
      <!-- content:contacts:hero -->
    </nav>

    <div class="hero__center rise rise--cluster">
      <div class="cluster" aria-hidden="true">
        <div class="cluster__skew">
          <svg class="star star--yellow cluster__star cluster__star--a" viewBox="0 0 100 100" width="108" height="108"><use href="#star"/></svg>
          <svg class="star star--yellow cluster__star cluster__star--b" viewBox="0 0 100 100" width="55" height="55"><use href="#star"/></svg>
          <svg class="star star--yellow cluster__star cluster__star--c" viewBox="0 0 100 100" width="40" height="40"><use href="#star"/></svg>
        </div>
      </div>
      <p class="hero__quote"><!-- content:catchline --></p>
    </div>

    <div class="hero__foot rise rise--foot">
      <span>HATSUBOSHI GAKUEN</span>
      <a href="#work">SCROLL <span class="bob">↓</span></a>
    </div>

  </div>

  <!-- yellow ticker (track + repeated groups rendered at build time) -->
  <div class="ticker rise rise--ticker">
    <!-- content:ticker -->
  </div>

</header>

<main>

<!-- ==================== ACT I · RECENT WORK ==================== -->
<section id="work" class="act act--work">
  <div class="act__header" data-reveal>
    <svg class="star star--badge" viewBox="0 0 100 100" width="14" height="14" aria-hidden="true"><use href="#star"/></svg>
    <span class="label-mono">Illustrations</span>
    <span class="act__rule"></span>
    <span class="act__jp" lang="ja">近作</span>
  </div>
  <h2 class="act__title" data-reveal>Recent <em>Work</em></h2>

  <div class="work-grid">
    <!-- content:works -->
  </div>
</section>

<!-- ==================== ACT II · NOTES ==================== -->
<section id="notes" class="act act--notes">
  <div class="act__header" data-reveal>
    <svg class="star star--badge" viewBox="0 0 100 100" width="14" height="14" aria-hidden="true"><use href="#star"/></svg>
    <span class="label-mono">Musings</span>
    <span class="act__rule"></span>
    <span class="act__jp" lang="ja">徒然</span>
  </div>
  <h2 class="act__title act__title--notes" data-reveal>Miscellaneous <em>Thoughts</em></h2>

  <div class="post-list">
    <!-- content:posts -->
    <div class="post-list__end"></div>
  </div>
</section>

</main>

<!-- ==================== CURTAIN CALL ==================== -->
<footer class="finale">
  <img class="watermark watermark--finale" src="/logo-yellow.svg" alt="" loading="lazy" decoding="async">

  <div class="finale__center" data-reveal>
    <span class="finale__kicker">Contacts <span lang="ja">連絡先</span></span>
    <span class="finale__headline">Don't be a stranger,<br><em>come say hello.</em></span>
    <div class="finale__contacts">
      <!-- content:contacts:finale -->
    </div>
  </div>

  <div class="finale__bar">
    <span>© EUPH</span>
    <span><a href="#top">Top ↑</a></span>
  </div>
</footer>

</body>
</html>
